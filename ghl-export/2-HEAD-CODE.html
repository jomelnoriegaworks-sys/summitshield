<!-- ============================================================
     SUMMIT SHIELD INSURANCE — GHL HEADER CODE
     Paste into: Site/Funnel Settings > Custom Code > Header Code
     (or the page-level Tracking Code > Header box)
     ============================================================ -->

<!-- Mobile rendering: without this tag phones render the page
     desktop-sized and zoomed out. GHL usually injects its own
     viewport meta; keeping this here is a safe no-op in that case
     and a critical fix when the template doesn't. -->
<meta name="viewport" content="width=device-width, initial-scale=1">

<meta name="theme-color" content="#0B2D5C">

<!-- Social sharing: without these, links to summitshield.online show a
     bare gray card in Slack/Facebook/LinkedIn. GHL page SEO settings can
     also set these; the header-code copy is the safety net. -->
<meta property="og:type" content="website">
<meta property="og:title" content="Summit Shield Insurance — Insurance that actually fits your life">
<meta property="og:description" content="30+ A-rated carriers compared in one honest 15-minute call. No pressure, no jargon. Book a free consultation.">
<meta property="og:url" content="https://summitshield.online/">
<meta property="og:image" content="https://summitshieldinsurance.netlify.app/assets/img/og-image.png">
<meta name="twitter:card" content="summary_large_image">

<!-- Favicon: overrides GHL's default funnel favicon on the published
     page. The 512px icon is what Google Search uses (48px multiple).
     Also upload favicon-512.png in GHL Settings > favicon as backup. -->
<link rel="icon" type="image/png" sizes="32x32" href="https://summitshieldinsurance.netlify.app/assets/img/favicon-32.png">
<link rel="icon" type="image/png" sizes="512x512" href="https://summitshieldinsurance.netlify.app/assets/img/favicon-512.png">
<link rel="apple-touch-icon" href="https://summitshieldinsurance.netlify.app/assets/img/apple-touch-icon.png">

<!-- Brand fonts (Poppins headings / Inter body) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
